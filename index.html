<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; } 
        label { display: block; margin: 10px 0 5px; }
        input[type="number"] { padding: 8px; width: 100%; max-width: 300px; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <h1>Income Tax Calculator</h1>
    <label for="income">Enter your Income:</label>
    <input type="number" id="income" placeholder="Enter your annual income" />
    <button onclick="calculateTax()">Calculate Tax</button>
    <h2 id="result"></h2>

    <script>
        function calculateTax() {
            const income = parseFloat(document.getElementById('income').value);
            let tax;
            if (income <= 10000) {
                tax = 0;
            } else if (income <= 40000) {
                tax = (income - 10000) * 0.1;
            } else {
                tax = (30000 * 0.1) + (income - 40000) * 0.2;
            }
            document.getElementById('result').innerText = `Your Income Tax is: $${tax.toFixed(2)}`;
        }
    </script>
</body>
</html>
