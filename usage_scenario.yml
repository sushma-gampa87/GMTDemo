---
name: Income Tax Calculator - GMT Measurement
author: sushma-gampa87
description: >
  Energy and CO2 measurement of the Income Tax Calculator Flask API.
  Tests the /calculate_tax and /tax_brackets API endpoints under load
  to measure CPU, memory and energy consumption.

services:

  tax-calculator:
    image: tax-calculator
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tax-calculator
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/tax_brackets')\""
      interval: "10s"
      timeout: "5s"
      retries: 10
      start_period: "30s"
    log-stdout: true
    log-stderr: true

  test-runner:
    image: curlimages/curl:latest
    container_name: test-runner
    depends_on:
      tax-calculator:
        condition: service_healthy
    log-stdout: true

flow:

  - name: Warmup
    container: test-runner
    commands:
      - type: console
        command: sleep 5
        note: Warmup - letting the app stabilize

  - name: Baseline Idle
    container: test-runner
    commands:
      - type: console
        command: sleep 10
        note: Idle baseline measurement - no load

  - name: GET tax_brackets
    container: test-runner
    commands:
      - type: console
        command: curl -s http://tax-calculator:5000/tax_brackets
        note: Fetch all tax brackets (GET request)
      - type: console
        command: sleep 2
        note: Cooldown between tests

  - name: POST calculate_tax - Low Income
    container: test-runner
    commands:
      - type: console
        command: curl -s -X POST http://tax-calculator:5000/calculate_tax -H "Content-Type: application/json" -d '{"income": 30000}'
        note: Calculate tax for income $30,000
      - type: console
        command: sleep 2

  - name: POST calculate_tax - High Income
    container: test-runner
    commands:
      - type: console
        command: curl -s -X POST http://tax-calculator:5000/calculate_tax -H "Content-Type: application/json" -d '{"income": 250000}'
        note: Calculate tax for income $250,000
      - type: console
        command: sleep 2

  - name: Load Test - 10 Sequential Requests
    container: test-runner
    commands:
      - type: console
        command: "for i in 10000 20000 30000 40000 50000 60000 70000 80000 90000 100000; do curl -s -X POST http://tax-calculator:5000/calculate_tax -H 'Content-Type: application/json' -d \"{\\\"income\\\": $i}\" > /dev/null; done"
        shell: sh
        note: 10 sequential tax calculation requests with varying incomes

  - name: Post-Load Cooldown
    container: test-runner
    commands:
      - type: console
        command: sleep 10
        note: Post-load idle measurement
